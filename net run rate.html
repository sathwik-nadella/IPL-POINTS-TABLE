<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPL Points Table</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
}

.container {
    width: 90%;
    margin: auto;
}

h2 {
    margin: 20px 0;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}

th {
    text-align: left;
}

.team {
    text-align: left;
    font-weight: bold;
}

/* Inputs */
input {
    width: 60px;
    padding: 4px;
}

/* Last 5 circles */
.circle {
    display: inline-block;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid gray;
    margin: 2px;
}

.win { background: #2ecc71; }
.loss { background: #e74c3c; }
</style>
</head>

<body>

<div class="container">
    <h2>IPL Points Table</h2>

    <table>
        <thead>
            <tr>
                <th>Team</th>
                <th>M</th>
                <th>W</th>
                <th>L</th>
                <th>NRR</th>
                <th>Pts</th>
                <th>Last 5</th>
                <th>Enter Match Data</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
const teams = ["RCB","SRH","CSK","DC","GT","KKR","LSG","MI","PBKS","RR"];

let data = {};

function init() {
    let tbody = document.getElementById("tableBody");

    teams.forEach(team => {
        data[team] = {
            matches: 0,
            wins: 0,
            losses: 0,
            runsScored: 0,
            oversFaced: 0,
            runsConceded: 0,
            oversBowled: 0,
            nrr: 0
        };

        let row = `
        <tr id="${team}">
            <td class="team">${team}</td>

            <td><input type="number" onchange="updateMatches('${team}', this.value)"></td>
            <td><input type="number" onchange="updateWins('${team}', this.value)"></td>

            <td id="${team}-loss">0</td>
            <td id="${team}-nrr">+0.000</td>
            <td id="${team}-pts">0</td>

            <td id="${team}-last">
                <span class="circle"></span>
                <span class="circle"></span>
                <span class="circle"></span>
                <span class="circle"></span>
                <span class="circle"></span>
            </td>

            <td>
                RS <input type="number" onchange="updateStats('${team}','rs',this.value)">
                OF <input type="number" onchange="updateStats('${team}','of',this.value)">
                RC <input type="number" onchange="updateStats('${team}','rc',this.value)">
                OB <input type="number" onchange="updateStats('${team}','ob',this.value)">
            </td>
        </tr>
        `;

        tbody.innerHTML += row;
    });
}

function updateMatches(team, val) {
    data[team].matches = parseFloat(val) || 0;
    updateDerived(team);
}

function updateWins(team, val) {
    data[team].wins = parseFloat(val) || 0;
    updateDerived(team);
}

function updateStats(team, type, val) {
    val = parseFloat(val) || 0;

    if(type === 'rs') data[team].runsScored = val;
    if(type === 'of') data[team].oversFaced = val;
    if(type === 'rc') data[team].runsConceded = val;
    if(type === 'ob') data[team].oversBowled = val;

    calculateNRR(team);
}

function updateDerived(team) {
    let t = data[team];

    t.losses = t.matches - t.wins;
    let points = t.wins * 2;

    document.getElementById(team+"-loss").innerText = t.losses;
    document.getElementById(team+"-pts").innerText = points;

    updateLast5(team);
}

function calculateNRR(team) {
    let t = data[team];

    if(t.oversFaced > 0 && t.oversBowled > 0) {
        let nrr = (t.runsScored / t.oversFaced) - (t.runsConceded / t.oversBowled);
        t.nrr = nrr;

        let sign = nrr >= 0 ? "+" : "";
        document.getElementById(team+"-nrr").innerText = sign + nrr.toFixed(3);
    }
}

function updateLast5(team) {
    let t = data[team];
    let container = document.getElementById(team+"-last");
    container.innerHTML = "";

    let wins = t.wins;
    let losses = t.losses;

    let results = [];

    for(let i=0;i<wins;i++) results.push("win");
    for(let i=0;i<losses;i++) results.push("loss");

    results = results.slice(-5);

    while(results.length < 5) results.unshift("empty");

    results.forEach(r => {
        let span = document.createElement("span");
        span.classList.add("circle");
        if(r==="win") span.classList.add("win");
        if(r==="loss") span.classList.add("loss");
        container.appendChild(span);
    });
}

init();
</script>

</body>
</html>
